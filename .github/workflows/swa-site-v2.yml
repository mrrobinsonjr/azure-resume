name: Azure Static Web Apps CI/CD (site-v2 preview)

on:
  workflow_dispatch:

jobs:
  build_and_preview:
    runs-on: ubuntu-latest
    name: Build and Deploy site-v2 Preview
    steps:
      - uses: actions/checkout@v4
      - name: Build and Deploy site-v2 Preview
        uses: Azure/static-web-apps-deploy@v1
        env:
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_CHAT_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_CHAT_DEPLOYMENT }}
          AZURE_OPENAI_EMBEDDING_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_EMBEDDING_DEPLOYMENT }}
          AZURE_OPENAI_API_VERSION: ${{ secrets.AZURE_OPENAI_API_VERSION }}
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_SITE_V2 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: site-v2
          api_location: api
          output_location: dist
